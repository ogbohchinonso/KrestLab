services:
  # ── KrestLab API Server ────────────────────────────────────────────────────
  backend:
    build: ./backend
    container_name: krestlab-api
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      MONGO_URI: mongodb://mongo:27017/krestlab
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      JUDGE0_URL: http://judge0-server:2358
      JUDGE0_AUTH_TOKEN: ${JUDGE0_AUTH_TOKEN}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:3000}
    depends_on:
      - mongo
      - judge0-server
    volumes:
      - ./backend:/app
      - /app/node_modules

  # ── MongoDB ────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: krestlab-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: krestlab

  # ── Judge0 CE (self-hosted code execution) ────────────────────────────────
  judge0-server:
    image: judge0/judge0:1.13.1
    container_name: krestlab-judge0
    restart: unless-stopped
    ports:
      - "2358:2358"
    privileged: true
    environment:
      POSTGRES_HOST: judge0-db
      POSTGRES_PORT: 5432
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: ${JUDGE0_DB_PASSWORD:-judge0pass}
      POSTGRES_DB: judge0
      REDIS_HOST: judge0-redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-judge0redis}
      AUTHN_HEADER: X-Auth-Token
      AUTHN_TOKEN: ${JUDGE0_AUTH_TOKEN}
    depends_on:
      - judge0-redis
      - judge0-db

  judge0-worker:
    image: judge0/judge0:1.13.1
    container_name: krestlab-judge0-worker
    restart: unless-stopped
    command: ["./scripts/workers"]
    privileged: true
    environment:
      POSTGRES_HOST: judge0-db
      POSTGRES_PORT: 5432
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: ${JUDGE0_DB_PASSWORD:-judge0pass}
      POSTGRES_DB: judge0
      REDIS_HOST: judge0-redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-judge0redis}
      AUTHN_HEADER: X-Auth-Token
      AUTHN_TOKEN: ${JUDGE0_AUTH_TOKEN}
    depends_on:
      - judge0-redis
      - judge0-db

  judge0-db:
    image: postgres:16
    container_name: krestlab-judge0-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: ${JUDGE0_DB_PASSWORD:-judge0pass}
      POSTGRES_DB: judge0
    volumes:
      - judge0_db_data:/var/lib/postgresql/data

  judge0-redis:
    image: redis:7
    container_name: krestlab-judge0-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-judge0redis}
    volumes:
      - judge0_redis_data:/data

volumes:
  mongo_data:
  judge0_db_data:
  judge0_redis_data:
