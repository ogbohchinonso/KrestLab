<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — KrestLab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
</head>
<body class="dash-page">

  <header class="topbar">
    <div class="topbar__left">
      <a href="index.html" class="topbar__brand">
        <span class="topbar__logo">⬡</span>
        <span class="topbar__name">KrestLab</span>
      </a>
    </div>
    <div class="topbar__right">
      <a href="index.html" class="btn btn--ghost">← IDE</a>
      <button class="btn btn--ghost" id="btnLogout">Log out</button>
    </div>
  </header>

  <main class="dash-main">
    <div class="dash-sidebar">
      <nav class="dash-nav">
        <button class="dash-nav-item active" data-tab="snippets">Snippets</button>
        <button class="dash-nav-item" data-tab="curricula">Learning paths</button>
        <button class="dash-nav-item" data-tab="profile">Profile</button>
      </nav>
      <div class="dash-xp" id="dashXp">
        <div class="xp-label">XP</div>
        <div class="xp-value" id="xpValue">0</div>
        <div class="xp-level">Level <span id="xpLevel">1</span></div>
      </div>
    </div>

    <div class="dash-content">

      <!-- Snippets tab -->
      <div class="dash-tab active" id="tab-snippets">
        <div class="dash-tab-header">
          <h2>My Snippets</h2>
          <a href="index.html" class="btn btn--accent">+ New Snippet</a>
        </div>
        <div class="snippet-grid" id="snippetGrid">
          <p class="loading-text">Loading…</p>
        </div>
      </div>

      <!-- Curricula tab -->
      <div class="dash-tab hidden" id="tab-curricula">
        <div class="dash-tab-header">
          <h2>Learning Paths</h2>
          <a href="index.html" class="btn btn--accent">+ Start New Path</a>
        </div>
        <div class="curriculum-list" id="curriculumList">
          <p class="loading-text">Loading…</p>
        </div>
      </div>

      <!-- Profile tab -->
      <div class="dash-tab hidden" id="tab-profile">
        <div class="dash-tab-header"><h2>Profile</h2></div>
        <div class="profile-form">
          <label class="field-label">Name</label>
          <input  class="field-input" id="profileName"  type="text" />
          <label class="field-label">Email</label>
          <input  class="field-input" id="profileEmail" type="email" disabled />
          <button class="btn btn--accent" id="btnSaveProfile">Save changes</button>

          <hr class="profile-divider" />
          <h3 class="profile-section-title">Change password</h3>
          <label class="field-label">Current password</label>
          <input  class="field-input" id="currentPw" type="password" />
          <label class="field-label">New password</label>
          <input  class="field-input" id="newPw"     type="password" />
          <button class="btn btn--ghost" id="btnChangePw">Update password</button>
        </div>
      </div>

    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
