<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign up — KrestLab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body class="auth-page">

  <div class="auth-card">
    <a href="index.html" class="auth-brand">
      <span class="topbar__logo">⬡</span>
      <span class="topbar__name">KrestLab</span>
    </a>
    <h1 class="auth-title">Create your account</h1>
    <p  class="auth-sub">Free forever. All languages. AI tutor included.</p>

    <div class="alert hidden" id="alertBox"></div>

    <div class="auth-form" id="registerForm">
      <label class="field-label">Full name</label>
      <input class="field-input" id="name"     type="text"     placeholder="Chinonso Obi" autocomplete="name" />

      <label class="field-label">Email</label>
      <input class="field-input" id="email"    type="email"    placeholder="you@example.com" autocomplete="email" />

      <label class="field-label">Password <span class="field-hint">(min 8 characters)</span></label>
      <input class="field-input" id="password" type="password" placeholder="••••••••" autocomplete="new-password" />

      <button class="btn btn--accent w-full" id="btnRegister">Create account</button>
    </div>

    <p class="auth-footer">Already have an account? <a href="login.html">Log in</a></p>
  </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    if (Auth.getToken()) window.location.href = 'index.html';

    document.getElementById('btnRegister').addEventListener('click', async () => {
      const name     = document.getElementById('name').value.trim();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('btnRegister');

      if (!name || !email || !password) return showAlert('Please fill in all fields.');
      if (password.length < 8)          return showAlert('Password must be at least 8 characters.');

      btn.disabled    = true;
      btn.textContent = 'Creating account…';

      try {
        await Auth.register(name, email, password);
        window.location.href = 'index.html';
      } catch (err) {
        showAlert(err.message);
        btn.disabled    = false;
        btn.textContent = 'Create account';
      }
    });

    function showAlert(msg) {
      const el = document.getElementById('alertBox');
      el.textContent = msg;
      el.classList.remove('hidden');
    }
  </script>
</body>
</html>
